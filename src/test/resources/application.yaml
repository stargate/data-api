stargate:
  debug:
    enabled: true

# change test port from 8081 (used by other SG services)
quarkus:
  http:
    # access log format, disabled for tests to reduce noise
    access-log:
      enabled: false
    test-port: 9080
  log:
    console:
      format: "%-5p [%t] %d{yyyy-MM-dd HH:mm:ss,SSS} %F:%L - %m%n"
    handler:
      console:
        PLAIN_CONSOLE:
          format: "%m%n"
        # Dedicated appender for the 'billing.events' category: writes only the
        # raw JSON event payload with no log prefix, so downstream billing
        # pipelines can parse each line as JSON.
        BILLING_CONSOLE:
          format: "%m%n"

    category:
      # production log level for this category is DEBUG, way too noisy for tests
      'io.stargate':
        level: INFO
      'io.stargate.sgv2.jsonapi.service.cqldriver':
        level: INFO
      # Suppress reflection hierarchy warnings for external dependencies not in Jandex
      # Fine for JVM mode; if building native images, use index-dependency instead
      'io.quarkus.deployment.steps.ReflectiveHierarchyStep':
        level: ERROR
      'io.stargate.sgv2.jsonapi.testbench.reporting.TestBenchConsoleWriter':
        level: INFO
        handlers:
          - PLAIN_CONSOLE
        use-parent-handlers: false
      # Route billing events to the dedicated BILLING_CONSOLE handler so the
      # log line is the raw JSON event with no prefix, and do not also write
      # to the default console handler.
      'billing.events':
        level: INFO
        handlers:
          - BILLING_CONSOLE
        use-parent-handlers: false
